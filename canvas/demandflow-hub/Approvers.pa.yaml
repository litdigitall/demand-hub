Screens:
  Approvers:
    Properties:
      Fill: =BrandBg
    Children:
      - conRootAp:
          Control: GroupContainer
          Variant: AutoLayout
          Properties:
            LayoutDirection: =LayoutDirection.Vertical
            LayoutGap: =0
            X: =0
            Y: =0
            Width: =Parent.Width
            Height: =Parent.Height
            Fill: =BrandBg
          Children:
            - conAccentLineAp:
                Control: GroupContainer
                Variant: AutoLayout
                Properties:
                  Height: =3
                  FillPortions: =0
                  AlignInContainer: =AlignInContainer.Stretch
                  Fill: =BrandBlue
            - conHeaderAp:
                Control: GroupContainer
                Variant: AutoLayout
                Properties:
                  LayoutDirection: =LayoutDirection.Horizontal
                  LayoutAlignItems: =LayoutAlignItems.Center
                  LayoutJustifyContent: =LayoutJustifyContent.SpaceBetween
                  LayoutGap: =16
                  Height: =64
                  FillPortions: =0
                  AlignInContainer: =AlignInContainer.Stretch
                  Fill: =BrandSurface
                  PaddingLeft: =24
                  PaddingRight: =24
                Children:
                  - conBrandLockupAp:
                      Control: GroupContainer
                      Variant: AutoLayout
                      Properties:
                        LayoutDirection: =LayoutDirection.Horizontal
                        LayoutAlignItems: =LayoutAlignItems.Center
                        LayoutGap: =12
                        Width: =470
                        FillPortions: =0
                        AlignInContainer: =AlignInContainer.Stretch
                      Children:
                        - conClientLogoAp:
                            Control: GroupContainer
                            Variant: AutoLayout
                            Properties:
                              Width: =118
                              Height: =20
                              FillPortions: =0
                              Fill: =BrandChip
                              BorderColor: =BrandLine
                              BorderThickness: =1
                        - conLockupDividerAp:
                            Control: GroupContainer
                            Variant: AutoLayout
                            Properties:
                              Width: =1
                              Height: =20
                              FillPortions: =0
                              Fill: =BrandLine
                        - conLitMarkAp:
                            Control: GroupContainer
                            Variant: AutoLayout
                            Properties:
                              Width: =34
                              Height: =34
                              FillPortions: =0
                              Fill: =BrandChip
                        - lblLockupAp:
                            Control: ModernText
                            Properties:
                              Text: ="ABBOTT · IT HUB (DMC) — LIT DIGITALL"
                              Size: =11
                              FontWeight: =FontWeight.Semibold
                              Color: =BrandMuted
                              AutoHeight: =true
                              FillPortions: =1
                  - conNavAp:
                      Control: GroupContainer
                      Variant: AutoLayout
                      Properties:
                        LayoutDirection: =LayoutDirection.Horizontal
                        LayoutAlignItems: =LayoutAlignItems.Center
                        LayoutJustifyContent: =LayoutJustifyContent.Center
                        LayoutGap: =4
                        FillPortions: =1
                        AlignInContainer: =AlignInContainer.Stretch
                      Children:
                        - btnNavHomeAp:
                            Control: Button
                            Properties:
                              Text: ="Home"
                              OnSelect: =Navigate(Home)
                              Appearance: ='ButtonCanvas.Appearance'.Transparent
                              BasePaletteColor: =BrandNavy
                              Height: =36
                              Width: =64
                              FillPortions: =0
                        - btnNavInboxAp:
                            Control: Button
                            Properties:
                              Text: ="Inbox"
                              OnSelect: =Navigate(Inbox)
                              Appearance: ='ButtonCanvas.Appearance'.Transparent
                              BasePaletteColor: =BrandNavy
                              Height: =36
                              Width: =64
                              FillPortions: =0
                        - btnNavRequestsAp:
                            Control: Button
                            Properties:
                              Text: ="Requests"
                              OnSelect: =Navigate(Requests)
                              Appearance: ='ButtonCanvas.Appearance'.Transparent
                              BasePaletteColor: =BrandNavy
                              Height: =36
                              Width: =88
                              FillPortions: =0
                        - btnNavNewAp:
                            Control: Button
                            Properties:
                              Text: ="New"
                              OnSelect: =Navigate(NewRequest)
                              Appearance: ='ButtonCanvas.Appearance'.Transparent
                              BasePaletteColor: =BrandNavy
                              Height: =36
                              Width: =56
                              FillPortions: =0
                        - btnNavScoreAp:
                            Control: Button
                            Properties:
                              Text: ="Score Board"
                              OnSelect: =Navigate(ScoreBoard)
                              Appearance: ='ButtonCanvas.Appearance'.Transparent
                              BasePaletteColor: =BrandNavy
                              Visible: =fxIsSponsor(varViewRole) || fxIsPMO(varViewRole) || fxIsDirector(varViewRole)
                              Height: =36
                              Width: =104
                              FillPortions: =0
                        - btnNavApproversAp:
                            Control: Button
                            Properties:
                              Text: ="Approvers"
                              OnSelect: =Navigate(Approvers)
                              Appearance: ='ButtonCanvas.Appearance'.Primary
                              BasePaletteColor: =BrandBlue
                              Visible: =fxIsSponsor(varViewRole) || fxIsPMO(varViewRole) || fxIsDirector(varViewRole)
                              Height: =36
                              Width: =96
                              FillPortions: =0
                        - btnNavCapacityAp:
                            Control: Button
                            Properties:
                              Text: ="Capacity"
                              OnSelect: =Navigate(Capacity)
                              Appearance: ='ButtonCanvas.Appearance'.Transparent
                              BasePaletteColor: =BrandNavy
                              Visible: =fxIsTechLead(varViewRole) || fxIsPMO(varViewRole)
                              Height: =36
                              Width: =88
                              FillPortions: =0
                  - conHeaderRightAp:
                      Control: GroupContainer
                      Variant: AutoLayout
                      Properties:
                        LayoutDirection: =LayoutDirection.Horizontal
                        LayoutAlignItems: =LayoutAlignItems.Center
                        LayoutJustifyContent: =LayoutJustifyContent.End
                        LayoutGap: =12
                        Width: =340
                        FillPortions: =0
                        AlignInContainer: =AlignInContainer.Stretch
                      Children:
                        - lblViewAsAp:
                            Control: ModernText
                            Properties:
                              Text: ="VIEW AS"
                              Size: =11
                              FontWeight: =FontWeight.Semibold
                              Color: =BrandMuted
                              AutoHeight: =true
                              Width: =56
                              FillPortions: =0
                        - ddViewRoleAp:
                            Control: Classic/DropDown
                            Properties:
                              Items: =["Admin","PMO","TechLead","Sponsor","Director","Requester"]
                              Default: =varViewRole
                              OnChange: =Set(varViewRole, Self.Selected.Value)
                              Width: =130
                              Height: =36
                              FillPortions: =0
                              Fill: =BrandSurface
                              Color: =BrandInk
                              BorderColor: =BrandLine
                              Size: =12
                        - lblUserAp:
                            Control: ModernText
                            Properties:
                              Text: =MyName
                              Size: =13
                              Color: =BrandInk
                              AutoHeight: =true
                              FillPortions: =1
            - conHairlineAp:
                Control: GroupContainer
                Variant: AutoLayout
                Properties:
                  Height: =1
                  FillPortions: =0
                  AlignInContainer: =AlignInContainer.Stretch
                  Fill: =BrandLine
            - conBodyAp:
                Control: GroupContainer
                Variant: AutoLayout
                Properties:
                  LayoutDirection: =LayoutDirection.Vertical
                  LayoutGap: =24
                  FillPortions: =1
                  AlignInContainer: =AlignInContainer.Stretch
                  LayoutOverflowY: =LayoutOverflow.Scroll
                  PaddingTop: =28
                  PaddingBottom: =32
                  PaddingLeft: =32
                  PaddingRight: =32
                Children:
                  - conTitleBlockAp:
                      Control: GroupContainer
                      Variant: AutoLayout
                      Properties:
                        LayoutDirection: =LayoutDirection.Vertical
                        LayoutGap: =4
                        Height: =64
                        FillPortions: =0
                        AlignInContainer: =AlignInContainer.Stretch
                      Children:
                        - lblKickerAp:
                            Control: ModernText
                            Properties:
                              Text: ="TRACKING"
                              Size: =11
                              FontWeight: =FontWeight.Bold
                              Color: =BrandBlue
                              AutoHeight: =true
                              FillPortions: =0
                              AlignInContainer: =AlignInContainer.Stretch
                        - lblTitleAp:
                            Control: ModernText
                            Properties:
                              Text: ="Approvers status"
                              Size: =26
                              FontWeight: =FontWeight.Semibold
                              Color: =BrandHeading
                              AutoHeight: =true
                              FillPortions: =0
                              AlignInContainer: =AlignInContainer.Stretch
                  - galApproverKpisAp:
                      Control: Gallery
                      Variant: Horizontal
                      Properties:
                        Items: |-
                          =With({t: AddColumns(Filter(colDemands, Status = "In approval"), ng,
                              With({p: First(SortByColumns(Filter(colApprovals, DemandID = ID && Status = "Pending"), "LevelOrder", SortOrder.Ascending))}, If(IsBlank(p.Level), "", p.Level)))},
                            Table(
                              {KLabel: "PENDING APPROVALS", N: CountRows(t)},
                              {KLabel: "WAITING ON SPONSOR", N: CountRows(Filter(t, ng = "Sponsor"))},
                              {KLabel: "WAITING ON TECH LEAD", N: CountRows(Filter(t, ng = "Tech Lead"))},
                              {KLabel: "WAITING ON DIRECTOR", N: CountRows(Filter(t, ng = "Director"))}))
                        TemplateSize: =(Self.Width - 48) / 4
                        TemplatePadding: =8
                        Height: =140
                        FillPortions: =0
                        AlignInContainer: =AlignInContainer.Stretch
                      Children:
                        - conKpiCardAp:
                            Control: GroupContainer
                            Variant: AutoLayout
                            Properties:
                              LayoutDirection: =LayoutDirection.Vertical
                              LayoutAlignItems: =LayoutAlignItems.Start
                              LayoutJustifyContent: =LayoutJustifyContent.Center
                              LayoutGap: =8
                              X: =0
                              Y: =0
                              Width: =Parent.TemplateWidth
                              Height: =Parent.TemplateHeight
                              PaddingTop: =20
                              PaddingBottom: =20
                              PaddingLeft: =20
                              PaddingRight: =20
                              Fill: =BrandSurface
                              RadiusTopLeft: =6
                              RadiusTopRight: =6
                              RadiusBottomLeft: =6
                              RadiusBottomRight: =6
                              DropShadow: =DropShadow.None
                              BorderColor: =BrandLine
                              BorderThickness: =1
                            Children:
                              - lblKpiLabelAp:
                                  Control: ModernText
                                  Properties:
                                    Text: =ThisItem.KLabel
                                    Size: =11
                                    FontWeight: =FontWeight.Bold
                                    Color: =BrandMuted
                                    AutoHeight: =true
                                    FillPortions: =0
                                    AlignInContainer: =AlignInContainer.Stretch
                              - lblKpiNumberAp:
                                  Control: ModernText
                                  Properties:
                                    Text: =Text(ThisItem.N)
                                    Size: =32
                                    FontWeight: =FontWeight.Semibold
                                    Color: =If(ThisItem.KLabel = "PENDING APPROVALS", BrandNavy, If(ThisItem.N > 0, BrandAmber, BrandNavy))
                                    AutoHeight: =true
                                    FillPortions: =0
                                    AlignInContainer: =AlignInContainer.Stretch
                  - conTableCardAp:
                      Control: GroupContainer
                      Variant: AutoLayout
                      Properties:
                        LayoutDirection: =LayoutDirection.Vertical
                        LayoutGap: =12
                        FillPortions: =0
                        AlignInContainer: =AlignInContainer.Stretch
                        PaddingTop: =24
                        PaddingBottom: =24
                        PaddingLeft: =24
                        PaddingRight: =24
                        Fill: =BrandSurface
                        RadiusTopLeft: =6
                        RadiusTopRight: =6
                        RadiusBottomLeft: =6
                        RadiusBottomRight: =6
                        DropShadow: =DropShadow.None
                        BorderColor: =BrandLine
                        BorderThickness: =1
                      Children:
                        - lblTableKickerAp:
                            Control: ModernText
                            Properties:
                              Text: ="IN APPROVAL — DMC GATES"
                              Size: =11
                              FontWeight: =FontWeight.Bold
                              Color: =BrandBlue
                              AutoHeight: =true
                              FillPortions: =0
                              AlignInContainer: =AlignInContainer.Stretch
                        - conTableHeaderAp:
                            Control: GroupContainer
                            Variant: AutoLayout
                            Properties:
                              LayoutDirection: =LayoutDirection.Horizontal
                              LayoutAlignItems: =LayoutAlignItems.Center
                              LayoutGap: =16
                              Height: =20
                              FillPortions: =0
                              AlignInContainer: =AlignInContainer.Stretch
                            Children:
                              - lblHdrDemandAp:
                                  Control: ModernText
                                  Properties:
                                    Text: ="DEMAND"
                                    Size: =11
                                    FontWeight: =FontWeight.Bold
                                    Color: =BrandMuted
                                    AutoHeight: =true
                                    FillPortions: =1
                              - lblHdrPriorityAp:
                                  Control: ModernText
                                  Properties:
                                    Text: ="PRIORITY"
                                    Size: =11
                                    FontWeight: =FontWeight.Bold
                                    Color: =BrandMuted
                                    AutoHeight: =true
                                    Width: =140
                                    FillPortions: =0
                              - lblHdrGatesAp:
                                  Control: ModernText
                                  Properties:
                                    Text: ="GATES"
                                    Size: =11
                                    FontWeight: =FontWeight.Bold
                                    Color: =BrandMuted
                                    AutoHeight: =true
                                    Width: =220
                                    FillPortions: =0
                              - lblHdrWaitingAp:
                                  Control: ModernText
                                  Properties:
                                    Text: ="WAITING ON"
                                    Size: =11
                                    FontWeight: =FontWeight.Bold
                                    Color: =BrandMuted
                                    AutoHeight: =true
                                    Width: =180
                                    FillPortions: =0
                        - conHdrLineAp:
                            Control: GroupContainer
                            Variant: AutoLayout
                            Properties:
                              Height: =1
                              FillPortions: =0
                              AlignInContainer: =AlignInContainer.Stretch
                              Fill: =BrandLine
                        - galApprovalTableAp:
                            Control: Gallery
                            Variant: Vertical
                            Properties:
                              Items: =Filter(colDemands, Status = "In approval")
                              TemplateSize: =96
                              TemplatePadding: =0
                              OnSelect: =Set(varD, LookUp(colDemands, ID = ThisItem.ID)); Navigate(Detail)
                              Height: =CountRows(Self.AllItems) * Self.TemplateHeight
                              FillPortions: =0
                              AlignInContainer: =AlignInContainer.Stretch
                            Children:
                              - conRowTableAp:
                                  Control: GroupContainer
                                  Variant: AutoLayout
                                  Properties:
                                    LayoutDirection: =LayoutDirection.Horizontal
                                    LayoutAlignItems: =LayoutAlignItems.Center
                                    LayoutGap: =16
                                    X: =0
                                    Y: =0
                                    Width: =Parent.TemplateWidth
                                    Height: =Parent.TemplateHeight
                                    PaddingTop: =8
                                    PaddingBottom: =8
                                  Children:
                                    - conColDemandAp:
                                        Control: GroupContainer
                                        Variant: AutoLayout
                                        Properties:
                                          LayoutDirection: =LayoutDirection.Vertical
                                          LayoutJustifyContent: =LayoutJustifyContent.Center
                                          LayoutGap: =6
                                          FillPortions: =1
                                          AlignInContainer: =AlignInContainer.Stretch
                                        Children:
                                          - conDemandTopAp:
                                              Control: GroupContainer
                                              Variant: AutoLayout
                                              Properties:
                                                LayoutDirection: =LayoutDirection.Horizontal
                                                LayoutAlignItems: =LayoutAlignItems.Center
                                                LayoutGap: =8
                                                Height: =24
                                                FillPortions: =0
                                                AlignInContainer: =AlignInContainer.Stretch
                                              Children:
                                                - pilHubAp:
                                                    Control: GroupContainer
                                                    Variant: AutoLayout
                                                    Properties:
                                                      LayoutDirection: =LayoutDirection.Horizontal
                                                      LayoutAlignItems: =LayoutAlignItems.Center
                                                      LayoutJustifyContent: =LayoutJustifyContent.Center
                                                      LayoutGap: =0
                                                      Width: =84
                                                      Height: =24
                                                      FillPortions: =0
                                                      PaddingLeft: =10
                                                      PaddingRight: =10
                                                      PaddingTop: =4
                                                      PaddingBottom: =4
                                                      RadiusTopLeft: =999
                                                      RadiusTopRight: =999
                                                      RadiusBottomLeft: =999
                                                      RadiusBottomRight: =999
                                                      Fill: =BrandChip
                                                    Children:
                                                      - lblHubAp:
                                                          Control: ModernText
                                                          Properties:
                                                            Text: =ThisItem.HubNumber
                                                            Size: =11
                                                            FontWeight: =FontWeight.Bold
                                                            Color: =BrandMuted
                                                            AutoHeight: =true
                                                - lblRowTitleAp:
                                                    Control: ModernText
                                                    Properties:
                                                      Text: =ThisItem.Title
                                                      Size: =15
                                                      FontWeight: =FontWeight.Semibold
                                                      Color: =BrandInk
                                                      AutoHeight: =true
                                                      FillPortions: =1
                                          - lblRowAreaAp:
                                              Control: ModernText
                                              Properties:
                                                Text: =ThisItem.Area
                                                Size: =12
                                                Color: =BrandMuted
                                                AutoHeight: =true
                                                FillPortions: =0
                                                AlignInContainer: =AlignInContainer.Stretch
                                    - conColPriorityAp:
                                        Control: GroupContainer
                                        Variant: AutoLayout
                                        Properties:
                                          LayoutDirection: =LayoutDirection.Vertical
                                          LayoutJustifyContent: =LayoutJustifyContent.Center
                                          LayoutGap: =6
                                          Width: =140
                                          FillPortions: =0
                                          AlignInContainer: =AlignInContainer.Stretch
                                        Children:
                                          - pilCritAp:
                                              Control: GroupContainer
                                              Variant: AutoLayout
                                              Properties:
                                                LayoutDirection: =LayoutDirection.Horizontal
                                                LayoutAlignItems: =LayoutAlignItems.Center
                                                LayoutJustifyContent: =LayoutJustifyContent.Center
                                                LayoutGap: =0
                                                Width: =100
                                                Height: =24
                                                FillPortions: =0
                                                PaddingLeft: =10
                                                PaddingRight: =10
                                                PaddingTop: =4
                                                PaddingBottom: =4
                                                RadiusTopLeft: =999
                                                RadiusTopRight: =999
                                                RadiusBottomLeft: =999
                                                RadiusBottomRight: =999
                                                Fill: =fxUrgencyFill(ThisItem.Urgency)
                                              Children:
                                                - lblCritAp:
                                                    Control: ModernText
                                                    Properties:
                                                      Text: =Upper(fxCriticality(ThisItem.Urgency))
                                                      Size: =11
                                                      FontWeight: =FontWeight.Bold
                                                      Color: =fxUrgencyColor(ThisItem.Urgency)
                                                      AutoHeight: =true
                                          - lblRankAp:
                                              Control: ModernText
                                              Properties:
                                                Text: =If(ThisItem.FinalPriority > 0, "#" & ThisItem.FinalPriority, "UNRANKED")
                                                Size: =12
                                                Color: =BrandMuted
                                                AutoHeight: =true
                                                FillPortions: =0
                                                AlignInContainer: =AlignInContainer.Stretch
                                    - galRowGatesAp:
                                        Control: Gallery
                                        Variant: Horizontal
                                        Properties:
                                          Items: =SortByColumns(Filter(colApprovals, DemandID = ThisItem.ID), "LevelOrder", SortOrder.Ascending)
                                          TemplateSize: =72
                                          TemplatePadding: =2
                                          Width: =220
                                          Height: =28
                                          FillPortions: =0
                                          AlignInContainer: =AlignInContainer.Center
                                        Children:
                                          - pilGateAp:
                                              Control: GroupContainer
                                              Variant: AutoLayout
                                              Properties:
                                                LayoutDirection: =LayoutDirection.Horizontal
                                                LayoutAlignItems: =LayoutAlignItems.Center
                                                LayoutJustifyContent: =LayoutJustifyContent.Center
                                                LayoutGap: =0
                                                X: =0
                                                Y: =(Parent.TemplateHeight - 24) / 2
                                                Width: =66
                                                Height: =24
                                                PaddingLeft: =4
                                                PaddingRight: =4
                                                PaddingTop: =4
                                                PaddingBottom: =4
                                                RadiusTopLeft: =999
                                                RadiusTopRight: =999
                                                RadiusBottomLeft: =999
                                                RadiusBottomRight: =999
                                                Fill: =Switch(ThisItem.Status, "Approved", BrandOkSoft, "Rejected", BrandDangerSoft, BrandChip)
                                              Children:
                                                - lblGateAp:
                                                    Control: ModernText
                                                    Properties:
                                                      Text: =Switch(ThisItem.Status, "Approved", "✓ ", "Rejected", "✕ ", "") & ThisItem.Level
                                                      Size: =10
                                                      FontWeight: =FontWeight.Bold
                                                      Color: =Switch(ThisItem.Status, "Approved", BrandOk, "Rejected", BrandDanger, BrandMuted)
                                                      AutoHeight: =true
                                    - conColWaitingAp:
                                        Control: GroupContainer
                                        Variant: AutoLayout
                                        Properties:
                                          LayoutDirection: =LayoutDirection.Horizontal
                                          LayoutAlignItems: =LayoutAlignItems.Center
                                          LayoutJustifyContent: =LayoutJustifyContent.Start
                                          LayoutGap: =0
                                          Width: =180
                                          FillPortions: =0
                                          AlignInContainer: =AlignInContainer.Stretch
                                        Children:
                                          - pilWaitingAp:
                                              Control: GroupContainer
                                              Variant: AutoLayout
                                              Properties:
                                                LayoutDirection: =LayoutDirection.Horizontal
                                                LayoutAlignItems: =LayoutAlignItems.Center
                                                LayoutJustifyContent: =LayoutJustifyContent.Center
                                                LayoutGap: =0
                                                Width: =172
                                                Height: =24
                                                FillPortions: =0
                                                PaddingLeft: =10
                                                PaddingRight: =10
                                                PaddingTop: =4
                                                PaddingBottom: =4
                                                RadiusTopLeft: =999
                                                RadiusTopRight: =999
                                                RadiusBottomLeft: =999
                                                RadiusBottomRight: =999
                                                Fill: =BrandAmberSoft
                                              Children:
                                                - lblWaitingAp:
                                                    Control: ModernText
                                                    Properties:
                                                      Text: |-
                                                        ="WAITING ON " & Upper(With({p: First(SortByColumns(Filter(colApprovals, DemandID = ThisItem.ID && Status = "Pending"), "LevelOrder", SortOrder.Ascending))}, If(IsBlank(p.Level), "—", p.Level)))
                                                      Size: =10
                                                      FontWeight: =FontWeight.Bold
                                                      Color: =BrandAmber
                                                      AutoHeight: =true
                        - lblEmptyTableAp:
                            Control: ModernText
                            Properties:
                              Text: ="No demands are currently in approval."
                              Size: =13
                              Color: =BrandMuted
                              AutoHeight: =true
                              Visible: =CountRows(galApprovalTableAp.AllItems) = 0
                              FillPortions: =0
                              AlignInContainer: =AlignInContainer.Stretch
