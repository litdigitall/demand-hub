App:
  Properties:
    StartScreen: =Home
    Formulas: |-
      =// ===================================================================
      // DemandFlow Hub — "LIT Digitall Enterprise" design system tokens
      // Source: docs/BRAND-IDENTITY-PROMPT.md (light theme). Never hardcode
      // colors in screens — always reference these named formulas.
      // ===================================================================
      BrandBg = RGBA(243, 247, 250, 1);
      BrandSurface = RGBA(255, 255, 255, 1);
      BrandInk = RGBA(22, 41, 58, 1);
      BrandHeading = RGBA(10, 46, 76, 1);
      BrandMuted = RGBA(88, 112, 133, 1);
      BrandLine = RGBA(216, 226, 235, 1);
      BrandBlue = RGBA(0, 114, 188, 1);
      BrandNavy = RGBA(0, 62, 102, 1);
      BrandBlueSoft = RGBA(233, 243, 251, 1);
      BrandAmber = RGBA(194, 122, 16, 1);
      BrandAmberSoft = RGBA(251, 241, 223, 1);
      BrandOk = RGBA(14, 127, 110, 1);
      BrandOkSoft = RGBA(226, 242, 238, 1);
      BrandDanger = RGBA(192, 57, 43, 1);
      BrandDangerSoft = RGBA(250, 233, 230, 1);
      BrandChip = RGBA(240, 246, 251, 1);

      // ===================================================================
      // Identity (demo: current signed-in user; role comes from varViewRole)
      // ===================================================================
      MyEmail = Lower(User().Email);
      MyName = User().FullName;

      // ===================================================================
      // Role helpers — PURE functions. Named formulas cannot read variables,
      // so every call site passes varViewRole, e.g. fxIsPMO(varViewRole).
      // // SWAP TO SHAREPOINT: derive roles from the 'User Roles' list
      // (Filter('User Roles', UserEmail = MyEmail)) instead of varViewRole.
      // ===================================================================
      fxIsAdmin(vr: Text): Boolean = vr = "Admin";
      fxIsPMO(vr: Text): Boolean = vr = "Admin" || vr = "PMO";
      fxIsTechLead(vr: Text): Boolean = vr = "Admin" || vr = "TechLead";
      fxIsSponsor(vr: Text): Boolean = vr = "Admin" || vr = "Sponsor";
      fxIsDirector(vr: Text): Boolean = vr = "Admin" || vr = "Director";

      // ===================================================================
      // Workflow engine helpers (mirror of the prototype's workflow.ts)
      // ===================================================================
      fxNeedsMe(vr: Text, st: Text, reqEmail: Text, nextGate: Text): Boolean =
        Switch(st,
          "New", fxIsPMO(vr),
          "In evaluation", fxIsPMO(vr) || fxIsTechLead(vr),
          "In approval",
            Switch(nextGate,
              "Sponsor", fxIsSponsor(vr),
              "Tech Lead", fxIsTechLead(vr),
              "Director", fxIsDirector(vr),
              false),
          "Prioritized", fxIsPMO(vr) || fxIsTechLead(vr),
          "In execution", fxIsPMO(vr) || fxIsTechLead(vr),
          "Returned", Lower(reqEmail) = MyEmail,
          false);

      // Weighted score — official weights 25/15/10/20/15/10/5
      fxWeightedScore(bi: Number, risk: Number, tech: Number, rev: Number, strat: Number, stake: Number, urg: Number): Number =
        Round(
          Coalesce(bi, 1) * 0.25 +
          Coalesce(risk, 1) * 0.15 +
          Coalesce(tech, 1) * 0.10 +
          Coalesce(rev, 1) * 0.20 +
          Coalesce(strat, 1) * 0.15 +
          Coalesce(stake, 1) * 0.10 +
          Coalesce(urg, 1) * 0.05, 2);

      // Abbott Project Type routing: <80h ME · <=500k Rapid · >500k Phase 0
      fxProjectType(hours: Number, valueRange: Text): Text =
        If(hours > 0 && hours < 80, "Minor Enhancement",
           valueRange = ">500k", "Phase 0",
           "Rapid");

      fxCriticality(urg: Text): Text =
        Switch(urg, "Critical", "Critical", "High", "High", "Medium", "Medium", "Low");

      // ===================================================================
      // Semantic colors (strong tone for text/accents, soft tone for fills)
      // ===================================================================
      fxStatusColor(st: Text): Color =
        Switch(st,
          "New", BrandBlue,
          "In evaluation", BrandBlue,
          "In approval", BrandAmber,
          "Prioritized", BrandNavy,
          "In execution", BrandBlue,
          "Completed", BrandOk,
          "Returned", BrandAmber,
          "Rejected", BrandDanger,
          BrandMuted);

      fxStatusFill(st: Text): Color =
        Switch(st,
          "In approval", BrandAmberSoft,
          "Returned", BrandAmberSoft,
          "Completed", BrandOkSoft,
          "Rejected", BrandDangerSoft,
          BrandBlueSoft);

      fxUrgencyColor(urg: Text): Color =
        Switch(urg, "Critical", BrandDanger, "High", BrandAmber, "Medium", BrandBlue, BrandMuted);

      fxUrgencyFill(urg: Text): Color =
        Switch(urg, "Critical", BrandDangerSoft, "High", BrandAmberSoft, "Medium", BrandBlueSoft, BrandChip);

      fxScoreColor(w: Number): Color = If(w >= 4, BrandDanger, w >= 3, BrandAmber, BrandBlue);
      fxScoreFill(w: Number): Color = If(w >= 4, BrandDangerSoft, w >= 3, BrandAmberSoft, BrandBlueSoft)
    OnStart: |-
