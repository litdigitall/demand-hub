Screens:
  Requests:
    Properties:
      Fill: =BrandBg
    Children:
      - conRootRq:
          Control: GroupContainer
          Variant: AutoLayout
          Properties:
            LayoutDirection: =LayoutDirection.Vertical
            LayoutGap: =0
            X: =0
            Y: =0
            Width: =Parent.Width
            Height: =Parent.Height
            Fill: =BrandBg
          Children:
            - conAccentLineRq:
                Control: GroupContainer
                Variant: AutoLayout
                Properties:
                  Height: =3
                  FillPortions: =0
                  AlignInContainer: =AlignInContainer.Stretch
                  Fill: =BrandBlue
            - conHeaderRq:
                Control: GroupContainer
                Variant: AutoLayout
                Properties:
                  LayoutDirection: =LayoutDirection.Horizontal
                  LayoutAlignItems: =LayoutAlignItems.Center
                  LayoutJustifyContent: =LayoutJustifyContent.SpaceBetween
                  LayoutGap: =16
                  Height: =64
                  FillPortions: =0
                  AlignInContainer: =AlignInContainer.Stretch
                  Fill: =BrandSurface
                  PaddingLeft: =24
                  PaddingRight: =24
                Children:
                  - conBrandLockupRq:
                      Control: GroupContainer
                      Variant: AutoLayout
                      Properties:
                        LayoutDirection: =LayoutDirection.Horizontal
                        LayoutAlignItems: =LayoutAlignItems.Center
                        LayoutGap: =12
                        Height: =40
                        FillPortions: =0
                      Children:
                        - conClientLogoRq:
                            Control: GroupContainer
                            Variant: AutoLayout
                            Properties:
                              Width: =118
                              Height: =20
                              FillPortions: =0
                              Fill: =BrandChip
                              BorderColor: =BrandLine
                              BorderThickness: =1
                              RadiusTopLeft: =4
                              RadiusTopRight: =4
                              RadiusBottomLeft: =4
                              RadiusBottomRight: =4
                              DropShadow: =DropShadow.None
                        - conLockupDividerRq:
                            Control: GroupContainer
                            Variant: AutoLayout
                            Properties:
                              Width: =1
                              Height: =20
                              FillPortions: =0
                              Fill: =BrandLine
                        - conLitMarkRq:
                            Control: GroupContainer
                            Variant: AutoLayout
                            Properties:
                              Width: =34
                              Height: =34
                              FillPortions: =0
                              Fill: =BrandChip
                              BorderColor: =BrandLine
                              BorderThickness: =1
                              RadiusTopLeft: =6
                              RadiusTopRight: =6
                              RadiusBottomLeft: =6
                              RadiusBottomRight: =6
                              DropShadow: =DropShadow.None
                        - lblLockupCaptionRq:
                            Control: ModernText
                            Properties:
                              Text: ="ABBOTT · IT HUB (DMC) — LIT DIGITALL"
                              Size: =11
                              FontWeight: =FontWeight.Semibold
                              Color: =BrandMuted
                              AutoHeight: =true
                              Width: =270
                              FillPortions: =0
                  - conNavRq:
                      Control: GroupContainer
                      Variant: AutoLayout
                      Properties:
                        LayoutDirection: =LayoutDirection.Horizontal
                        LayoutAlignItems: =LayoutAlignItems.Center
                        LayoutGap: =4
                        Height: =40
                        FillPortions: =0
                      Children:
                        - btnNavHomeRq:
                            Control: Button
                            Properties:
                              Text: ="Home"
                              Appearance: ='ButtonCanvas.Appearance'.Transparent
                              BasePaletteColor: =BrandBlue
                              OnSelect: =Navigate(Home)
                              Height: =36
                              Width: =72
                              FillPortions: =0
                        - btnNavInboxRq:
                            Control: Button
                            Properties:
                              Text: ="Inbox"
                              Appearance: ='ButtonCanvas.Appearance'.Transparent
                              BasePaletteColor: =BrandBlue
                              OnSelect: =Navigate(Inbox)
                              Height: =36
                              Width: =72
                              FillPortions: =0
                        - btnNavRequestsRq:
                            Control: Button
                            Properties:
                              Text: ="Requests"
                              Appearance: ='ButtonCanvas.Appearance'.Primary
                              BasePaletteColor: =BrandBlue
                              OnSelect: =Navigate(Requests)
                              Height: =36
                              Width: =96
                              FillPortions: =0
                        - btnNavNewRq:
                            Control: Button
                            Properties:
                              Text: ="New"
                              Appearance: ='ButtonCanvas.Appearance'.Transparent
                              BasePaletteColor: =BrandBlue
                              OnSelect: =Navigate(NewRequest)
                              Height: =36
                              Width: =60
                              FillPortions: =0
                        - btnNavScoreRq:
                            Control: Button
                            Properties:
                              Text: ="Score Board"
                              Appearance: ='ButtonCanvas.Appearance'.Transparent
                              BasePaletteColor: =BrandBlue
                              OnSelect: =Navigate(ScoreBoard)
                              Visible: =fxIsSponsor(varViewRole) || fxIsPMO(varViewRole) || fxIsDirector(varViewRole)
                              Height: =36
                              Width: =110
                              FillPortions: =0
                        - btnNavApproversRq:
                            Control: Button
                            Properties:
                              Text: ="Approvers"
                              Appearance: ='ButtonCanvas.Appearance'.Transparent
                              BasePaletteColor: =BrandBlue
                              OnSelect: =Navigate(Approvers)
                              Visible: =fxIsSponsor(varViewRole) || fxIsPMO(varViewRole) || fxIsDirector(varViewRole)
                              Height: =36
                              Width: =100
                              FillPortions: =0
                        - btnNavCapacityRq:
                            Control: Button
                            Properties:
                              Text: ="Capacity"
                              Appearance: ='ButtonCanvas.Appearance'.Transparent
                              BasePaletteColor: =BrandBlue
                              OnSelect: =Navigate(Capacity)
                              Visible: =fxIsTechLead(varViewRole) || fxIsPMO(varViewRole)
                              Height: =36
                              Width: =92
                              FillPortions: =0
                  - conHeaderRightRq:
                      Control: GroupContainer
                      Variant: AutoLayout
                      Properties:
                        LayoutDirection: =LayoutDirection.Horizontal
                        LayoutAlignItems: =LayoutAlignItems.Center
                        LayoutGap: =12
                        Height: =40
                        FillPortions: =0
                      Children:
                        - lblViewAsRq:
                            Control: ModernText
                            Properties:
                              Text: ="VIEW AS"
                              Size: =11
                              FontWeight: =FontWeight.Semibold
                              Color: =BrandMuted
                              AutoHeight: =true
                              Width: =56
                              FillPortions: =0
                        - ddViewRoleRq:
                            Control: Classic/DropDown
                            Properties:
                              Items: =["Admin","PMO","TechLead","Sponsor","Director","Requester"]
                              Default: =varViewRole
                              OnChange: =Set(varViewRole, Self.Selected.Value)
                              Width: =130
                              Height: =36
                              FillPortions: =0
                              Fill: =BrandSurface
                              Color: =BrandInk
                              BorderColor: =BrandLine
                              BorderThickness: =1
                              Size: =12
                              ChevronFill: =BrandMuted
                              ChevronBackground: =BrandSurface
                        - lblUserNameRq:
                            Control: ModernText
                            Properties:
                              Text: =MyName
                              Size: =13
                              Color: =BrandInk
                              AutoHeight: =true
                              Width: =150
                              FillPortions: =0
            - conHairlineRq:
                Control: GroupContainer
                Variant: AutoLayout
                Properties:
                  Height: =1
                  FillPortions: =0
                  AlignInContainer: =AlignInContainer.Stretch
                  Fill: =BrandLine
            - conBodyRq:
                Control: GroupContainer
                Variant: AutoLayout
                Properties:
                  LayoutDirection: =LayoutDirection.Vertical
                  LayoutGap: =24
                  FillPortions: =1
                  AlignInContainer: =AlignInContainer.Stretch
                  LayoutOverflowY: =LayoutOverflow.Scroll
                  PaddingTop: =28
                  PaddingBottom: =32
                  PaddingLeft: =32
                  PaddingRight: =32
                Children:
                  - conTitleBlockRq:
                      Control: GroupContainer
                      Variant: AutoLayout
                      Properties:
                        LayoutDirection: =LayoutDirection.Vertical
                        LayoutGap: =4
                        Height: =64
                        FillPortions: =0
                        AlignInContainer: =AlignInContainer.Stretch
                      Children:
                        - lblKickerRq:
                            Control: ModernText
                            Properties:
                              Text: ="DEMANDS"
                              Size: =11
                              FontWeight: =FontWeight.Bold
                              Color: =BrandBlue
                              AutoHeight: =true
                              FillPortions: =0
                              AlignInContainer: =AlignInContainer.Stretch
                        - lblTitleRq:
                            Control: ModernText
                            Properties:
                              Text: ="All requests"
                              Size: =26
                              FontWeight: =FontWeight.Semibold
                              Color: =BrandHeading
                              AutoHeight: =true
                              FillPortions: =0
                              AlignInContainer: =AlignInContainer.Stretch
                  - conFiltersRq:
                      Control: GroupContainer
                      Variant: AutoLayout
                      Properties:
                        LayoutDirection: =LayoutDirection.Horizontal
                        LayoutAlignItems: =LayoutAlignItems.Center
                        LayoutGap: =12
                        Height: =48
                        FillPortions: =0
                        AlignInContainer: =AlignInContainer.Stretch
                      Children:
                        - tabViewsRq:
                            Control: ModernTabList
                            Properties:
                              Items: =["All","Infrastructure","Artificial Intelligence","Applications"]
                              Default: '={Value: "All"}'
                              Width: =520
                              Height: =44
                              FillPortions: =0
                        - txtSearchRq:
                            Control: ModernTextInput
                            Properties:
                              Placeholder: ="Search by title"
                              Width: =240
                              Height: =40
                              FillPortions: =0
                        - ddStatusRq:
                            Control: Classic/DropDown
                            Properties:
                              Items: =["All","New","In evaluation","In approval","Prioritized","In execution","Completed","Returned","Rejected"]
                              Default: =If(varStatusFilter = "" || varStatusFilter = "New+Eval", "All", varStatusFilter)
                              OnChange: =Set(varStatusFilter, If(Self.Selected.Value = "All", "", Self.Selected.Value))
                              Width: =170
                              Height: =40
                              FillPortions: =0
                              Fill: =BrandSurface
                              Color: =BrandInk
                              BorderColor: =BrandLine
                              BorderThickness: =1
                              Size: =13
                              ChevronFill: =BrandMuted
                              ChevronBackground: =BrandSurface
                        - ddUrgencyRq:
                            Control: Classic/DropDown
                            Properties:
                              Items: =["All","Critical","High","Medium","Low"]
                              Default: =If(varUrgFilter = "", "All", varUrgFilter)
                              OnChange: =Set(varUrgFilter, If(Self.Selected.Value = "All", "", Self.Selected.Value))
                              Width: =130
                              Height: =40
                              FillPortions: =0
                              Fill: =BrandSurface
                              Color: =BrandInk
                              BorderColor: =BrandLine
                              BorderThickness: =1
                              Size: =13
                              ChevronFill: =BrandMuted
                              ChevronBackground: =BrandSurface
                        - btnOverdueRq:
                            Control: Button
                            Properties:
                              Text: =If(varOverdueOnly, "OVERDUE ONLY ✓", "OVERDUE ONLY")
                              Appearance: =If(varOverdueOnly, 'ButtonCanvas.Appearance'.Primary, 'ButtonCanvas.Appearance'.Outline)
                              BasePaletteColor: =BrandAmber
                              OnSelect: =Set(varOverdueOnly, !varOverdueOnly)
                              Width: =160
                              Height: =40
                              FillPortions: =0
                        - btnClearRq:
                            Control: Button
                            Properties:
                              Text: ="CLEAR"
                              Appearance: ='ButtonCanvas.Appearance'.Transparent
                              BasePaletteColor: =BrandBlue
                              OnSelect: |-
                                =Set(varStatusFilter, "");
                                Set(varUrgFilter, "");
                                Set(varOverdueOnly, false);
                                Reset(txtSearchRq)
                              Visible: =varStatusFilter <> "" || varUrgFilter <> "" || varOverdueOnly
                              Width: =90
                              Height: =40
                              FillPortions: =0
                  - conTableCardRq:
                      Control: GroupContainer
                      Variant: AutoLayout
                      Properties:
                        LayoutDirection: =LayoutDirection.Vertical
                        LayoutGap: =8
                        FillPortions: =0
                        AlignInContainer: =AlignInContainer.Stretch
                        Fill: =BrandSurface
                        RadiusTopLeft: =6
                        RadiusTopRight: =6
                        RadiusBottomLeft: =6
                        RadiusBottomRight: =6
                        DropShadow: =DropShadow.None
                        BorderColor: =BrandLine
                        BorderThickness: =1
                        PaddingTop: =16
                        PaddingBottom: =16
                        PaddingLeft: =16
                        PaddingRight: =16
                      Children:
                        - conTableHeaderRq:
                            Control: GroupContainer
                            Variant: AutoLayout
                            Properties:
                              LayoutDirection: =LayoutDirection.Horizontal
                              LayoutAlignItems: =LayoutAlignItems.Center
                              LayoutGap: =12
                              Height: =28
                              FillPortions: =0
                              AlignInContainer: =AlignInContainer.Stretch
                              PaddingLeft: =16
                              PaddingRight: =16
                            Children:
                              - lblHdrIdRq:
                                  Control: ModernText
                                  Properties:
                                    Text: ="#"
                                    Size: =11
                                    FontWeight: =FontWeight.Semibold
                                    Color: =BrandMuted
                                    AutoHeight: =true
                                    Width: =90
                                    FillPortions: =0
                              - lblHdrDemandRq:
                                  Control: ModernText
                                  Properties:
                                    Text: ="DEMAND"
                                    Size: =11
                                    FontWeight: =FontWeight.Semibold
                                    Color: =BrandMuted
                                    AutoHeight: =true
                                    FillPortions: =1
                              - lblHdrTypeRq:
                                  Control: ModernText
                                  Properties:
                                    Text: ="TYPE"
                                    Size: =11
                                    FontWeight: =FontWeight.Semibold
                                    Color: =BrandMuted
                                    AutoHeight: =true
                                    Width: =170
                                    FillPortions: =0
                              - lblHdrUrgencyRq:
                                  Control: ModernText
                                  Properties:
                                    Text: ="URGENCY"
                                    Size: =11
                                    FontWeight: =FontWeight.Semibold
                                    Color: =BrandMuted
                                    AutoHeight: =true
                                    Width: =100
                                    FillPortions: =0
                              - lblHdrStatusRq:
                                  Control: ModernText
                                  Properties:
                                    Text: ="STATUS"
                                    Size: =11
                                    FontWeight: =FontWeight.Semibold
                                    Color: =BrandMuted
                                    AutoHeight: =true
                                    Width: =120
                                    FillPortions: =0
                              - lblHdrScoreRq:
                                  Control: ModernText
                                  Properties:
                                    Text: ="SCORE"
                                    Size: =11
                                    FontWeight: =FontWeight.Semibold
                                    Color: =BrandMuted
                                    Align: =Align.Right
                                    AutoHeight: =true
                                    Width: =60
                                    FillPortions: =0
                              - lblHdrCreatedRq:
                                  Control: ModernText
                                  Properties:
                                    Text: ="CREATED"
                                    Size: =11
                                    FontWeight: =FontWeight.Semibold
                                    Color: =BrandMuted
                                    Align: =Align.Right
                                    AutoHeight: =true
                                    Width: =70
                                    FillPortions: =0
                        - conHeaderHairlineRq:
                            Control: GroupContainer
                            Variant: AutoLayout
                            Properties:
                              Height: =1
                              FillPortions: =0
                              AlignInContainer: =AlignInContainer.Stretch
                              Fill: =BrandLine
                        - galRequestsRq:
                            Control: Gallery
                            Variant: Vertical
                            Properties:
                              Items: |-
                                =SortByColumns(
                                  Filter(colDemands,
                                    (varStatusFilter = "" || If(varStatusFilter = "New+Eval", Status = "New" || Status = "In evaluation", Status = varStatusFilter)),
                                    (varUrgFilter = "" || Urgency = varUrgFilter),
                                    (!varOverdueOnly || (Deadline < Today() && Status <> "Completed" && Status <> "Rejected")),
                                    (tabViewsRq.Selected.Value = "All" || Classification = tabViewsRq.Selected.Value),
                                    (IsBlank(txtSearchRq.Text) || StartsWith(Title, txtSearchRq.Text))),
                                  "Created", SortOrder.Descending)
                              TemplateSize: =88
                              TemplatePadding: =0
                              OnSelect: |-
                                =Set(varD, LookUp(colDemands, ID = ThisItem.ID));
                                Navigate(Detail)
                              Height: =CountRows(Self.AllItems) * Self.TemplateHeight
                              FillPortions: =0
                              AlignInContainer: =AlignInContainer.Stretch
                            Children:
                              - conReqRowRq:
                                  Control: GroupContainer
                                  Variant: AutoLayout
                                  Properties:
                                    LayoutDirection: =LayoutDirection.Horizontal
                                    LayoutAlignItems: =LayoutAlignItems.Center
                                    LayoutGap: =12
                                    X: =0
                                    Y: =0
                                    Width: =Parent.TemplateWidth
                                    Height: =Parent.TemplateHeight
                                    Fill: =BrandSurface
                                    PaddingLeft: =16
                                    PaddingRight: =16
                                  Children:
                                    - pilHubRq:
                                        Control: GroupContainer
                                        Variant: AutoLayout
                                        Properties:
                                          LayoutDirection: =LayoutDirection.Horizontal
                                          LayoutAlignItems: =LayoutAlignItems.Center
                                          LayoutJustifyContent: =LayoutJustifyContent.Center
                                          LayoutGap: =0
                                          PaddingLeft: =10
                                          PaddingRight: =10
                                          PaddingTop: =4
                                          PaddingBottom: =4
                                          RadiusTopLeft: =999
                                          RadiusTopRight: =999
                                          RadiusBottomLeft: =999
                                          RadiusBottomRight: =999
                                          Fill: =BrandChip
                                          Width: =90
                                          FillPortions: =0
                                        Children:
                                          - pilHubTextRq:
                                              Control: ModernText
                                              Properties:
                                                Text: =ThisItem.HubNumber
                                                Size: =11
                                                FontWeight: =FontWeight.Bold
                                                Color: =BrandMuted
                                                AutoHeight: =true
                                    - conReqTitleBlockRq:
                                        Control: GroupContainer
                                        Variant: AutoLayout
                                        Properties:
                                          LayoutDirection: =LayoutDirection.Vertical
                                          LayoutJustifyContent: =LayoutJustifyContent.Center
                                          LayoutGap: =2
                                          FillPortions: =1
                                          AlignInContainer: =AlignInContainer.Stretch
                                        Children:
                                          - lblReqTitleRq:
                                              Control: ModernText
                                              Properties:
                                                Text: =ThisItem.Title
                                                Size: =15
                                                FontWeight: =FontWeight.Semibold
                                                Color: =BrandInk
                                                AutoHeight: =true
                                                FillPortions: =0
                                                AlignInContainer: =AlignInContainer.Stretch
                                          - lblReqAreaRq:
                                              Control: ModernText
                                              Properties:
                                                Text: =ThisItem.Area
                                                Size: =12
                                                Color: =BrandMuted
                                                AutoHeight: =true
                                                FillPortions: =0
                                                AlignInContainer: =AlignInContainer.Stretch
                                    - pilClassRq:
                                        Control: GroupContainer
                                        Variant: AutoLayout
                                        Properties:
                                          LayoutDirection: =LayoutDirection.Horizontal
                                          LayoutAlignItems: =LayoutAlignItems.Center
                                          LayoutJustifyContent: =LayoutJustifyContent.Center
                                          LayoutGap: =0
                                          PaddingLeft: =10
                                          PaddingRight: =10
                                          PaddingTop: =4
                                          PaddingBottom: =4
                                          RadiusTopLeft: =999
                                          RadiusTopRight: =999
                                          RadiusBottomLeft: =999
                                          RadiusBottomRight: =999
                                          Fill: =BrandBlueSoft
                                          Width: =170
                                          FillPortions: =0
                                        Children:
                                          - pilClassTextRq:
                                              Control: ModernText
                                              Properties:
                                                Text: =Upper(ThisItem.Classification)
                                                Size: =11
                                                FontWeight: =FontWeight.Bold
                                                Color: =BrandBlue
                                                AutoHeight: =true
                                    - pilUrgRq:
                                        Control: GroupContainer
                                        Variant: AutoLayout
                                        Properties:
                                          LayoutDirection: =LayoutDirection.Horizontal
                                          LayoutAlignItems: =LayoutAlignItems.Center
                                          LayoutJustifyContent: =LayoutJustifyContent.Center
                                          LayoutGap: =0
                                          PaddingLeft: =10
                                          PaddingRight: =10
                                          PaddingTop: =4
                                          PaddingBottom: =4
                                          RadiusTopLeft: =999
                                          RadiusTopRight: =999
                                          RadiusBottomLeft: =999
                                          RadiusBottomRight: =999
                                          Fill: =fxUrgencyFill(ThisItem.Urgency)
                                          Width: =100
                                          FillPortions: =0
                                        Children:
                                          - pilUrgTextRq:
                                              Control: ModernText
                                              Properties:
                                                Text: =Upper(ThisItem.Urgency)
                                                Size: =11
                                                FontWeight: =FontWeight.Bold
                                                Color: =fxUrgencyColor(ThisItem.Urgency)
                                                AutoHeight: =true
                                    - pilStatusRq:
                                        Control: GroupContainer
                                        Variant: AutoLayout
                                        Properties:
                                          LayoutDirection: =LayoutDirection.Horizontal
                                          LayoutAlignItems: =LayoutAlignItems.Center
                                          LayoutJustifyContent: =LayoutJustifyContent.Center
                                          LayoutGap: =0
                                          PaddingLeft: =10
                                          PaddingRight: =10
                                          PaddingTop: =4
                                          PaddingBottom: =4
                                          RadiusTopLeft: =999
                                          RadiusTopRight: =999
                                          RadiusBottomLeft: =999
                                          RadiusBottomRight: =999
                                          Fill: =fxStatusFill(ThisItem.Status)
                                          Width: =120
                                          FillPortions: =0
                                        Children:
                                          - pilStatusTextRq:
                                              Control: ModernText
                                              Properties:
                                                Text: =Upper(ThisItem.Status)
                                                Size: =11
                                                FontWeight: =FontWeight.Bold
                                                Color: =fxStatusColor(ThisItem.Status)
                                                AutoHeight: =true
                                    - lblReqScoreRq:
                                        Control: ModernText
                                        Properties:
                                          Text: =Text(fxWeightedScore(ThisItem.ScoreBusinessImpact, ThisItem.ScoreRisk, ThisItem.ScoreTech, ThisItem.ScoreRevenue, ThisItem.ScoreStrategic, ThisItem.ScoreStakeholder, ThisItem.ScoreUrgency), "0.00")
                                          Size: =14
                                          FontWeight: =FontWeight.Semibold
                                          Color: =BrandNavy
                                          Align: =Align.Right
                                          AutoHeight: =true
                                          Width: =60
                                          FillPortions: =0
                                    - lblReqCreatedRq:
                                        Control: ModernText
                                        Properties:
                                          Text: =Text(ThisItem.Created, "dd mmm")
                                          Size: =12
                                          Color: =BrandMuted
                                          Align: =Align.Right
                                          AutoHeight: =true
                                          Width: =70
                                          FillPortions: =0
                        - lblEmptyStateRq:
                            Control: ModernText
                            Properties:
                              Text: ="No requests match the current filters."
                              Size: =13
                              Color: =BrandMuted
                              AutoHeight: =true
                              Visible: =CountRows(galRequestsRq.AllItems) = 0
                              FillPortions: =0
                              AlignInContainer: =AlignInContainer.Stretch
